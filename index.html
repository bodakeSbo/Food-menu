<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Bodake's Kitchen</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#f4f4f4;
  color:#333;
}

header{
  background:#ff5722;
  color:white;
  padding:20px;
  text-align:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.container{
  width:90%;
  max-width:1100px;
  margin:auto;
  padding:20px 0;
}

.menu{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 3px 10px rgba(0,0,0,0.15);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-content{
  padding:15px;
  text-align:center;
}

.card h3{
  margin-bottom:10px;
}

.price{
  color:#ff5722;
  font-size:20px;
  margin-bottom:10px;
}

button{
  background:#ff5722;
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:6px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#e64a19;
}

.order-box{
  margin-top:40px;
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.order-box h2{
  margin-bottom:20px;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
  padding:10px;
  background:#fafafa;
  border-radius:6px;
}

.total{
  margin-top:15px;
  font-size:20px;
  font-weight:bold;
}

input,textarea{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:1px solid #ccc;
  border-radius:6px;
}

.submit-btn{
  width:100%;
  margin-top:15px;
  font-size:18px;
}

.success{
  color:green;
  margin-top:15px;
  font-weight:bold;
}

.remove-btn{
  background:red;
  padding:6px 10px;
}

.loading{
  opacity:0.7;
  pointer-events:none;
}

.empty{
  color:#777;
  margin-bottom:15px;
}

</style>
</head>

<body>

<header>
  <h1>🍔 Bodake's Kitchen</h1>
  <p>Fresh Food Delivered Fast</p>
</header>

<div class="container">

  <div class="menu">

    <!-- BURGER -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600">
      <div class="card-content">
        <h3>Burger</h3>
        <div class="price">₹199</div>
        <button onclick="addToCart('Burger',199)">
          Add to Cart
        </button>
      </div>
    </div>

    <!-- PIZZA -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=600">
      <div class="card-content">
        <h3>Pizza</h3>
        <div class="price">₹299</div>
        <button onclick="addToCart('Pizza',299)">
          Add to Cart
        </button>
      </div>
    </div>

    <!-- PASTA -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?w=600">
      <div class="card-content">
        <h3>Pasta</h3>
        <div class="price">₹249</div>
        <button onclick="addToCart('Pasta',249)">
          Add to Cart
        </button>
      </div>
    </div>

  </div>

  <!-- ORDER SECTION -->
  <div class="order-box">

    <h2>Your Order</h2>

    <div id="cartContainer">
      <p class="empty">Cart is empty</p>
    </div>

    <div class="total" id="totalPrice">
      Total: ₹0
    </div>

    <form id="orderForm">

      <input
        type="text"
        id="username"
        placeholder="Your Name"
        required
      >

      <input
        type="tel"
        id="mobile"
        placeholder="Mobile Number"
        required
      >

      <textarea
        id="location"
        rows="4"
        placeholder="Delivery Address"
        required
      ></textarea>

      <button class="submit-btn" type="submit">
        Place Order
      </button>

    </form>

    <p class="success" id="successMessage"></p>

  </div>

</div>

<script>

const BACKEND_URL = "https://food-menu-backend-5z12.onrender.com/order";

let cart = [];

function addToCart(name, price){

  const existing = cart.find(item => item.name === name);

  if(existing){
    existing.qty += 1;
  } else {
    cart.push({
      name,
      price,
      qty:1
    });
  }

  renderCart();
}

function removeItem(name){

  cart = cart.filter(item => item.name !== name);

  renderCart();
}

function renderCart(){

  const container =
    document.getElementById("cartContainer");

  const totalElement =
    document.getElementById("totalPrice");

  container.innerHTML = "";

  if(cart.length === 0){

    container.innerHTML =
      '<p class="empty">Cart is empty</p>';

    totalElement.innerText = "Total: ₹0";

    return;
  }

  let total = 0;

  cart.forEach(item => {

    total += item.price * item.qty;

    const div = document.createElement("div");

    div.className = "cart-item";

    div.innerHTML = `
      <div>
        <strong>${item.name}</strong><br>
        ₹${item.price} × ${item.qty}
      </div>

      <div>
        ₹${item.price * item.qty}
        <button
          class="remove-btn"
          onclick="removeItem('${item.name}')"
        >
          X
        </button>
      </div>
    `;

    container.appendChild(div);

  });

  totalElement.innerText = `Total: ₹${total}`;
}

document
.getElementById("orderForm")
.addEventListener("submit", async function(e){

  e.preventDefault();

  if(cart.length === 0){
    alert("Please add items");
    return;
  }

  const name =
    document.getElementById("username").value.trim();

  const mobile =
    document.getElementById("mobile").value.trim();

  const location =
    document.getElementById("location").value.trim();

  if(mobile.length < 10){
    alert("Invalid mobile number");
    return;
  }

  const button =
    document.querySelector(".submit-btn");

  button.innerText = "Processing...";
  button.disabled = true;

  try{

    const response = await fetch(BACKEND_URL,{

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({
        customer:{
          name,
          mobile,
          location
        },
        cart
      })

    });

    const data = await response.json();

    if(response.ok){

      document.getElementById("successMessage")
      .innerText =
        "✅ Order placed successfully!";

      cart = [];
      renderCart();

      this.reset();

    } else {

      alert(data.message || "Order failed");

    }

  } catch(error){

    console.log(error);

    alert("Server error");

  } finally {

    button.innerText = "Place Order";
    button.disabled = false;

  }

});

</script>

</body>
</html>
```
